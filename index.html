
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Best Dish & Recipe Finder</title>
  <style>

    body {
      margin: 0;
      padding: 0;
      background: #f0f0f0;
      font-family: sans-serif;
    }

    .app {
      max-width: 620px;
      margin: 40px auto;
      padding: 1.5rem 1.25rem;
      background: #ffffff;
      border: 3px solid #1a1a1a;
      border-radius: 16px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin: 0 0 6px;
      color: #1a1a1a;
    }

    .subtitle {
      font-size: 14px;
      color: #666;
      margin: 0 0 1.5rem;
      padding-bottom: 1.25rem;
      border-bottom: 2px solid #e0e0e0;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    select {
      flex: 1;
      min-width: 150px;
      padding: 10px 14px;
      border: 2px solid #1a1a1a;
      border-radius: 10px;
      font-size: 14px;
      background: white;
      cursor: pointer;
    }

    select:focus {
      outline: none;
      border-color: #555;
    }

    #diet {
      flex: 0 0 auto;
      min-width: 155px;
    }

    button {
      padding: 10px 22px;
      border: 2px solid #1a1a1a;
      border-radius: 10px;
      background: #1a1a1a;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #333; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    .empty {
      text-align: center;
      padding: 2.5rem 1rem;
      color: #aaa;
      font-size: 14px;
      border: 2px dashed #ddd;
      border-radius: 12px;
    }

    .status {
      font-size: 13px;
      color: #666;
      padding: 1rem 0;
      text-align: center;
    }

    .card {
      background: white;
      border: 3px solid #1a1a1a;
      border-radius: 14px;
      margin-bottom: 14px;
      overflow: hidden;
    }

    .card-header {
      padding: 14px 16px;
      border-bottom: 2px solid #1a1a1a;
      background: #f7f7f7;
    }

    .card-label {
      font-size: 11px;
      font-weight: 700;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .dish-name {
      font-size: 26px;
      font-weight: 700;
      color: #1a1a1a;
    }

    .dish-image {
      width: 100%;
      max-height: 280px;
      object-fit: cover;
      display: block;
      border-bottom: 2px solid #1a1a1a;
    }

    .error {
      font-size: 13px;
      color: #c0392b;
      background: #fdf0ee;
      border: 2px solid #e74c3c;
      border-radius: 10px;
      padding: 12px 16px;
    }

    /* Ingredient pills */
    .ingredients-wrap {
      padding: 12px;
      display: flex;
      flex-wrap: wrap;
    }

    .ingredient-pill {
      display: inline-block;
      background: #f5f5f5;
      border: 2px solid #e0e0e0;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      color: #333;
      margin: 4px;
    }

    /* Step boxes */
    .step-box {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 12px 16px;
      border-bottom: 2px solid #e8e8e8;
    }

    .step-box:last-child {
      border-bottom: none;
    }

    .step-num {
      min-width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #1a1a1a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .step-text {
      font-size: 13px;
      color: #333;
      line-height: 1.6;
      padding-top: 4px;
    }

  </style>
</head>
<body>

  <div class="app">

    <h1>Best dish &amp; recipe finder</h1>
    <p> class="subtitle">Pick a city and a dietary preference — Claude finds the dish, recipe and photo.</p>

    <div class="controls">

      <select id="place">
        <option value="Amritsar">Amritsar</option>
        <option value="New Delhi">New Delhi</option>
        <option value="Hyderabad">Hyderabad</option>
        <option value="Bangalore">Bangalore</option>
        <option value="Bombay">Bombay</option>
        <option value="Rome">Rome</option>
        <option value="London">London</option>
        <option value="Paris">Paris</option>
        <option value="Tokyo">Tokyo</option>
        <option value="Mexico City">Mexico City</option>
        <option value="Bangkok">Bangkok</option>
        <option value="Istanbul">Istanbul</option>
        <option value="Chamba">Chamba</option>
        <option value="Una, Himachal Pradesh">Una</option>
      </select>

      <select id="diet">
        <option value="no restriction">No restriction</option>
        <option value="vegetarian" selected>Vegetarian</option>
        <option value="vegan">Vegan</option>
        <option value="gluten free">Gluten free</option>
      </select>

      <button id="findBtn">Find dish</button>

    </div>

    <div id="output">
      <div class="empty">Choose a city and click Find dish.</div>
    </div>

  </div>

  <script>

    // Detects if running locally or on Netlify
    const IS_LOCAL = window.location.protocol === 'file:'
                  || window.location.hostname === 'localhost'
                  || window.location.hostname === '127.0.0.1'

    // Your Anthropic key — only used when testing locally
    const LOCAL_API_KEY = 
        'YOUR-LOCAL-API-KEY-HERE'

    // Unsplash key
    const UNSPLASH_KEY = 'M50RGdLXxS_R_QSOdgeCWr7Uk3_G2B3lfFeb1DIUY68'

    // Calls Claude — switches between local and Netlify automatically
    async function callClaude(system, userMessage, maxTokens) {

      if (IS_LOCAL) {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': LOCAL_API_KEY,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: 'claude-haiku-4-5-20251001',
            max_tokens: maxTokens,
            system: system,
            messages: [{ role: 'user', content: userMessage }]
          })
        })
      const data = await response.json()
        console.log('API response:', JSON.stringify(data))
        if (!data.content) throw new Error('No content: ' + JSON.stringify(data))
        return data.content[0].text.trim()

      } else {
        const response = await fetch('/.netlify/functions/get-recipe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            max_tokens: maxTokens,
            system: system,
            messages: [{ role: 'user', content: userMessage }]
          })
        })
        const data = await response.json()
        return data.content[0].text.trim()
      }

    }

    // Fetches dish photo from Unsplash
    async function fetchImage(dish) {
      const url = 'https://api.unsplash.com/search/photos'
                + '?query=' + encodeURIComponent(dish + ' food dish')
                + '&per_page=1'
                + '&orientation=landscape'
                + '&client_id=' + UNSPLASH_KEY
      const response = await fetch(url)
      const data = await response.json()
      if (data.results && data.results.length > 0) {
        return data.results[0].urls.regular
      }
      return null
    }

    async function go() {

      const place = document.getElementById('place').value
      const diet  = document.getElementById('diet').value
      const btn   = document.getElementById('findBtn')
      const out   = document.getElementById('output')

      btn.disabled = true
      btn.textContent = 'Finding...'
      out.innerHTML = '<div class="status">Finding best dish for ' + place + '...</div>'

      try {

        // Step 1 — get dish name
        const dish = await callClaude(
          'You are a food expert. Return ONLY the dish name, nothing else. No punctuation, no explanation.',
          'What is the single most iconic local dish of ' + place + '?',
          100
        )

        out.innerHTML = '<div class="status">Found it — ' + dish + '. Getting recipe and photo...</div>'

        // Step 2 — get recipe JSON and photo in parallel
        const [recipeRaw, imageUrl] = await Promise.all([
          callClaude(
            'You are a friendly cooking instructor. Always respond with valid JSON only — no markdown, no backticks, no explanation. Return exactly this structure: {"ingredients": ["ingredient 1", "ingredient 2"], "steps": ["step 1", "step 2"]}. Ingredients must be an array of strings. Steps must be an array of strings.',
            'Give me a ' + diet + ' friendly beginner recipe for ' + dish + ' from ' + place + '. Return as JSON with ingredients array and steps array.',
            1000
          ),
          fetchImage(dish)
        ])

       
        // Step 3 — parse JSON from Claude
            let ingredientsList = []
            let stepsList = []
            try {
              // Strip markdown code fences if Claude added the
              const cleaned = recipeRaw
                .replace(/```json/g, '')
                .replace(/```/g, '')
                .trim()
              const recipeData = JSON.parse(cleaned)
              ingredientsList = recipeData.ingredients || []
              stepsList = recipeData.steps || []
            } catch(e) {
              ingredientsList = ['Could not parse ingredients — please try again']
              stepsList = ['Could not parse steps — please try again']
            }

        // Step 4 — build ingredient pills
        const ingredientPills = ingredientsList.map(function(ing) {
          return '<span class="ingredient-pill">' + ing + '</span>'
        }).join('')

        // Step 5 — build step boxes
        const stepBoxes = stepsList.map(function(step, i) {
          return '<div class="step-box">' +
            '<div class="step-num">' + (i + 1) + '</div>' +
            '<div class="step-text">' + step + '</div>' +
          '</div>'
        }).join('')

        // Step 6 — display everything
        out.innerHTML =

          '<div class="card">' +
            '<div class="card-header">' +
              '<div class="card-label">Most iconic dish in ' + place + '</div>' +
              '<div class="dish-name">' + dish + '</div>' +
            '</div>' +
            (imageUrl ? '<img class="dish-image" src="' + imageUrl + '" alt="' + dish + '">' : '') +
          '</div>' +

          '<div class="card">' +
            '<div class="card-header">' +
              '<div class="card-label">Ingredients — ' + diet + '</div>' +
            '</div>' +
            '<div class="ingredients-wrap">' + ingredientPills + '</div>' +
          '</div>' +

          '<div class="card">' +
            '<div class="card-header">' +
              '<div class="card-label">Steps</div>' +
            '</div>' +
            stepBoxes +
          '</div>'

      } catch(e) {
        out.innerHTML = '<div class="error">Something went wrong: ' + e.message + '</div>'
      }

      btn.disabled = false
      btn.textContent = 'Find dish'

    }

    document.getElementById('findBtn').addEventListener('click', go)

  </script>

</body>
</html>
